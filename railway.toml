# Railway — PrintDrop deployment config
# Dockerfile paths are configured per-service via RAILWAY_DOCKERFILE_PATH env var:
#   printdrop / printdrop-api  → backend/Dockerfile
#   printdrop-dashboard        → dashboard/Dockerfile
#   printdrop-libreoffice      → libreoffice/Dockerfile

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
