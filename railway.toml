# Railway — PrintDrop deployment config
# This applies to backend services (printdrop, printdrop-api).
# The printdrop-dashboard service must have its Dockerfile path
# set manually in Railway Dashboard → Settings → Source:
#   Dockerfile Path: dashboard/Dockerfile
#   Docker Context: .

[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
