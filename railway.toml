# Railway — PrintDrop deployment config
# Each service (backend, dashboard, libreoffice) is configured
# as a separate service in the Railway project, each pointing
# to its own Dockerfile.
#
# Service setup in Railway dashboard:
#   1. printdrop-api       → backend/Dockerfile  (root service)
#   2. printdrop-dashboard → dashboard/Dockerfile
#   3. printdrop-libreoffice → libreoffice/Dockerfile

[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"
dockerContext = "."

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
