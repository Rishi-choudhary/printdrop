# Railway — PrintDrop deployment config
# Each service is configured separately.
# Service setup:
#   1. printdrop / printdrop-api  → backend/Dockerfile
#   2. printdrop-dashboard        → dashboard/Dockerfile
#   3. printdrop-libreoffice      → libreoffice/Dockerfile
#   4. printdrop-redis            → Railway managed Redis

[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
