<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#2563EB"/>
  <g transform="translate(96, 80)" fill="white">
    <!-- Printer body -->
    <rect x="40" y="120" width="240" height="120" rx="16" fill="white"/>
    <!-- Paper tray top -->
    <rect x="80" y="40" width="160" height="80" rx="8" fill="white" opacity="0.8"/>
    <!-- Paper output -->
    <rect x="80" y="240" width="160" height="100" rx="8" fill="white" opacity="0.8"/>
    <!-- Drop icon -->
    <circle cx="260" cy="160" r="8" fill="#F97316"/>
    <!-- Lines on paper -->
    <rect x="110" y="270" width="100" height="6" rx="3" fill="#2563EB" opacity="0.4"/>
    <rect x="110" y="290" width="70" height="6" rx="3" fill="#2563EB" opacity="0.4"/>
    <rect x="110" y="310" width="90" height="6" rx="3" fill="#2563EB" opacity="0.4"/>
  </g>
</svg>
