appId: app.printdrop.agent
productName: PrintDrop Agent
copyright: "Copyright © 2026 PrintDrop"
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

directories:
  output: dist
  buildResources: build

files:
  - main.js
  - preload.js
  - src/**/*
  - renderer/**/*
  - assets/**/*
  - "!**/*.map"
  - "!**/{.DS_Store,.gitkeep,.gitignore,Thumbs.db}"
  - "!node_modules/**/{test,tests,__tests__,spec,example,examples,docs,doc}/**"
  - "!node_modules/**/*.{md,markdown,ts,flow,coffee}"
  - "!node_modules/**/{README*,CHANGELOG*,HISTORY*,LICENSE*,license*,AUTHORS*}"

asar: true
compression: normal

# ── macOS ────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.utilities
  icon: build/icon.icns
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  # Unsigned builds OK for MVP — users right-click → Open first time.
  # For production: set APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID
  # env vars and uncomment `notarize: true` below.
  identity: null
  # notarize: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    LSUIElement: true                      # Menu-bar app on macOS; click the menu-bar icon to open.
    NSPrinterUsageDescription: "PrintDrop prints customer documents to your shop printers."
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

dmg:
  title: "${productName} ${version}"
  icon: build/icon.icns
  background: build/dmg-background.png
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 200
      type: file
    - x: 400
      y: 200
      type: link
      path: /Applications

# ── Windows ──────────────────────────────────────────────────────────────────
win:
  icon: build/icon.ico
  publisherName: PrintDrop
  requestedExecutionLevel: asInvoker
  # Optionally bundle SumatraPDF: drop the 64-bit EXE at resources/win/SumatraPDF.exe.
  # If it's absent, src/sumatra.js will download it on first run.
  extraResources:
    - from: resources/win
      to: .
      filter: ["SumatraPDF.exe"]
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: PrintDrop Agent
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  include: build/installer.nsh

portable:
  artifactName: "${productName}-${version}-portable.${ext}"

# ── Linux ────────────────────────────────────────────────────────────────────
linux:
  icon: build/icons
  category: Utility
  synopsis: Print shop agent for PrintDrop
  description: >
    PrintDrop Desktop Agent listens for incoming print jobs, shows a live queue,
    and prints to configured local printers automatically.
  desktop:
    StartupWMClass: PrintDrop Agent
    Terminal: false
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]

# ── Auto-update ──────────────────────────────────────────────────────────────
# Set GH_TOKEN env var, then `npm run release` to publish a draft release.
publish:
  provider: github
  owner: Rishi-choudhary
  repo: printdrop
  releaseType: release
