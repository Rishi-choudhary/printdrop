<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrintDrop Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; color: #e2e8f0;
      min-height: 100vh; padding: 24px;
    }
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { font-size: 20px; color: #60a5fa; }
    .header p { font-size: 12px; color: #64748b; margin-top: 4px; }

    .status-card {
      background: #1e293b; border-radius: 12px; padding: 16px;
      margin-bottom: 16px; border: 1px solid #334155;
    }
    .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .status-row:last-child { margin-bottom: 0; }
    .label { font-size: 13px; color: #94a3b8; }
    .value { font-size: 13px; font-weight: 600; }
    .value.connected { color: #34d399; }
    .value.disconnected { color: #f87171; }
    .value.polling { color: #60a5fa; }

    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot.green { background: #34d399; animation: pulse 2s infinite; }
    .dot.red { background: #f87171; }
    .dot.blue { background: #60a5fa; animation: pulse 2s infinite; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .config-section { margin-top: 16px; }
    .config-section label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    .config-section input {
      width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0; font-size: 13px; margin-bottom: 12px;
    }
    .config-section input:focus { outline: none; border-color: #60a5fa; }

    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-danger { background: #dc2626; color: white; margin-top: 8px; }
    .btn-danger:hover { background: #b91c1c; }

    .jobs-list { margin-top: 16px; }
    .job-item {
      background: #1e293b; border-radius: 8px; padding: 12px;
      margin-bottom: 8px; border-left: 3px solid #60a5fa;
    }
    .job-item.printing { border-left-color: #f59e0b; }
    .job-item.done { border-left-color: #34d399; }
    .job-name { font-size: 13px; font-weight: 600; }
    .job-meta { font-size: 11px; color: #64748b; margin-top: 4px; }
    .empty { text-align: center; color: #475569; font-size: 13px; padding: 32px 0; }

    .counter { display: flex; gap: 12px; margin-top: 16px; }
    .counter-item {
      flex: 1; background: #1e293b; border-radius: 8px; padding: 12px; text-align: center;
    }
    .counter-num { font-size: 24px; font-weight: 700; color: #60a5fa; }
    .counter-label { font-size: 11px; color: #64748b; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>PrintDrop Agent</h1>
    <p>Desktop print automation</p>
  </div>

  <div class="status-card">
    <div class="status-row">
      <span class="label">Connection</span>
      <span class="value" id="connStatus"><span class="dot red"></span>Not connected</span>
    </div>
    <div class="status-row">
      <span class="label">Mode</span>
      <span class="value" id="modeStatus">--</span>
    </div>
    <div class="status-row">
      <span class="label">Last poll</span>
      <span class="value" id="lastPoll">--</span>
    </div>
  </div>

  <div class="counter">
    <div class="counter-item">
      <div class="counter-num" id="printedCount">0</div>
      <div class="counter-label">Printed today</div>
    </div>
    <div class="counter-item">
      <div class="counter-num" id="queueCount">0</div>
      <div class="counter-label">In queue</div>
    </div>
  </div>

  <div class="jobs-list" id="jobsList">
    <div class="empty">No recent jobs</div>
  </div>

  <div class="status-card config-section" id="configForm">
    <label>API URL</label>
    <input type="text" id="apiUrl" placeholder="http://localhost:3001" />
    <label>Agent Key</label>
    <input type="password" id="agentKey" placeholder="agent_xxxxxxxxxx" />
    <button class="btn btn-primary" onclick="startAgent()">Connect & Start</button>
  </div>

  <script>
    let polling = false;
    let pollTimer = null;
    let stats = { printed: 0, queue: 0 };
    let recentJobs = [];

    // Try to load config from Tauri or localStorage
    async function loadConfig() {
      try {
        if (window.__TAURI__) {
          const config = await window.__TAURI__.core.invoke('get_config');
          document.getElementById('apiUrl').value = config.api_url || '';
          document.getElementById('agentKey').value = config.agent_key || '';
          if (config.agent_key) startAgent();
        }
      } catch {
        const saved = JSON.parse(localStorage.getItem('pdAgent') || '{}');
        if (saved.apiUrl) document.getElementById('apiUrl').value = saved.apiUrl;
        if (saved.agentKey) document.getElementById('agentKey').value = saved.agentKey;
      }
    }

    async function apiFetch(path) {
      const apiUrl = document.getElementById('apiUrl').value || 'http://localhost:3001';
      const key = document.getElementById('agentKey').value;
      const res = await fetch(`${apiUrl}${path}`, {
        headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    async function updateStatus(jobId, status) {
      const apiUrl = document.getElementById('apiUrl').value || 'http://localhost:3001';
      const key = document.getElementById('agentKey').value;
      await fetch(`${apiUrl}/api/jobs/${jobId}/status`, {
        method: 'PATCH',
        headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
    }

    function setConnected(ok) {
      const el = document.getElementById('connStatus');
      el.innerHTML = ok
        ? '<span class="dot green"></span>Connected'
        : '<span class="dot red"></span>Disconnected';
      el.className = 'value ' + (ok ? 'connected' : 'disconnected');
    }

    function renderJobs() {
      const el = document.getElementById('jobsList');
      if (recentJobs.length === 0) {
        el.innerHTML = '<div class="empty">No recent jobs</div>';
        return;
      }
      el.innerHTML = recentJobs.slice(0, 10).map(j => {
        const cls = j.status === 'printing' ? 'printing' : j.status === 'ready' ? 'done' : '';
        return `<div class="job-item ${cls}">
          <div class="job-name">#${String(j.token).padStart(3,'0')} ${j.fileName}</div>
          <div class="job-meta">${j.pageCount}pg | ${j.color?'Color':'B&W'} | ${j.copies}x | ${j.status}</div>
        </div>`;
      }).join('');
    }

    async function pollOnce() {
      try {
        const data = await apiFetch('/api/jobs?status=queued');
        const jobs = (data.jobs || []).filter(j => j.status === 'queued');
        stats.queue = jobs.length;
        document.getElementById('queueCount').textContent = stats.queue;
        document.getElementById('lastPoll').textContent = new Date().toLocaleTimeString();
        setConnected(true);

        for (const job of jobs) {
          if (recentJobs.find(j => j.id === job.id)) continue;
          recentJobs.unshift({ ...job, status: 'printing' });
          renderJobs();

          // Simulate print
          await updateStatus(job.id, 'printing');
          await new Promise(r => setTimeout(r, 1000 + Math.random() * 2000));
          await updateStatus(job.id, 'ready');

          const idx = recentJobs.findIndex(j => j.id === job.id);
          if (idx >= 0) recentJobs[idx].status = 'ready';
          stats.printed++;
          document.getElementById('printedCount').textContent = stats.printed;
          renderJobs();

          // Desktop notification
          if (window.__TAURI__) {
            await window.__TAURI__.notification.sendNotification({
              title: 'Print Complete',
              body: `#${String(job.token).padStart(3,'0')} ${job.fileName} is ready`
            });
          }
        }
      } catch (err) {
        console.error('Poll error:', err);
        setConnected(false);
      }
    }

    function startAgent() {
      const apiUrl = document.getElementById('apiUrl').value;
      const agentKey = document.getElementById('agentKey').value;
      if (!agentKey) return alert('Agent Key is required');

      localStorage.setItem('pdAgent', JSON.stringify({ apiUrl, agentKey }));
      document.getElementById('modeStatus').textContent = 'Simulate';

      if (pollTimer) clearInterval(pollTimer);
      polling = true;
      pollOnce();
      pollTimer = setInterval(pollOnce, 5000);
    }

    loadConfig();
  </script>
</body>
</html>
