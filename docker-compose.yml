version: '3.8'

services:
  # ---- Core Infrastructure ----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: printdrop
      POSTGRES_USER: printdrop
      POSTGRES_PASSWORD: printdrop_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U printdrop
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Doc Conversion ----
  libreoffice:
    build: ./libreoffice
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
    healthcheck:
      test: curl -f http://localhost:3002/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 3

  # ---- Backend API ----
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://printdrop:printdrop_dev@postgres:5432/printdrop
      DIRECT_URL: postgresql://printdrop:printdrop_dev@postgres:5432/printdrop
      REDIS_URL: redis://redis:6379
      LIBREOFFICE_URL: http://libreoffice:3002
      STORAGE_DRIVER: local
      NODE_ENV: production
      PORT: 3001
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  # ---- Dashboard ----
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  uploads:
